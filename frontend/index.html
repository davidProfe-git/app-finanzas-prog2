<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1>Gestionador de Ingresos y Gastos</h1>
    
    <!-- Sección para el formulario de registro de movimientos -->
    <div class="tarjeta  tarjeta-formulario">

        <div class="campo">
            <label for="valor">Valor</label>
            <input type="text" id="valor" placeholder="Ej: 500000">
        </div>

        <div class="campo">
            <label for="opciones">Elige una opción:</label>
            <select name="opciones" id="select-categorias">
                <!-- Aquí se van a cargar las categorías desde la base de datos -->
                <option value="" selected disabled hidden>-- Seleccione una categoría --</option>
            </select>
        </div>

        <div class="campo">
            <label for="fecha">Fecha</label>
            <input type="date" id="fecha">
        </div>

        <button id="btn-registrar">Registrar movimiento</button>
    </div>

    <!-- Sección para el historial de movimientos -->
    <div class="tarjeta tarjeta-historial">

        <div>
            <h3 class="titulo-historial">HISTORIAL DE REGISTROS</h3>
        </div>

        <div class="contenedor-tablas">
            <div id="tabla-ingresos">
                <table>
                    <thead>
                        <tr>
                            <th class="th-ingresos" colspan="4">INGRESOS</th>
                        </tr>
                        <tr>
                            <th>Categoría</th>
                            <th>Valor</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="row-ingreso">
                    </tbody>
                </table>
            </div>
            <div id="tabla-gastos">
                <table>
                    <thead>
                        <tr>
                            <th class="th-gastos" colspan="4">GASTOS</th>
                        </tr>
                        <tr>
                            <th>Categoría</th>
                            <th>Valor</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="row-gasto">
                    </tbody>
                </table>
            </div>
        </div>
        <br>
        <h3 class="titulo-historial">BALANCE</h3>
        <div class="balance-detalle">
            <span>Total Ingresos:</span>
            <span id="balance-ingresos" class="balance-positivo">$0</span>
        </div>
        
        <div class="balance-detalle">
            <span>Total Gastos:</span>
            <span id="balance-gastos" class="balance-negativo">$0</span>
        </div>

        <div class="balance-detalle balance-final">
            <span>Balance:</span>
            <span id="balance-total">$0</span>
        </div>
        <button id="btn-reiniciar" class="btn-peligro">Reiniciar Historial</button>
    </div>
    
    <!-- Modal de edición de movimientos -->
    <div id="modal-editar" class="modal-overlay">
        <div class="modal-contenido">
            <h3 class="modal-titulo">Editar movimiento</h3>
            <input type="hidden" id="editar-id">
            <div class="campo">
                <label for="editar-valor">Valor</label>
                <input type="text" id="editar-valor">
            </div>
            
            <div class="campo">
                <label for="editar-categoria">Categoría</label>
                <select id="editar-categoria"></select>
            </div>
            
            <div class="campo">
                <label for="editar-fecha">Fecha</label>
                <input type="date" id="editar-fecha">
            </div>
            
            <div class="modal-botones">
                <button id="btn-cancelar-editar" class="btn-cancelar">Cancelar</button>
                <button id="btn-guardar-editar">Guardar cambios</button>
            </div>
        </div>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
