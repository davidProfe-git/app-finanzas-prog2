<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gestionador de Ingresos y Gastos</h1>
    
    <div class="tarjeta">

        <div class="campo">
            <label for="valor">Valor</label>
            <input type="text" id="valor" placeholder="Ej: 500000">
        </div>

        <div class="campo">
            <label for="opciones">Elige una opción:</label>
            <select name="opciones" id="opciones">
                <option value="Categoria 1">Sueldo</option>
                <option value="Categoria 2">Ingreso extra</option>
                <option value="Categoria 3">Arriendo</option>
            </select>
        </div>

        <button>Registrar</button>

        <div class="contenedor-tablas">
            <table>
                <tr>
                    <th class="th-ingresos" colspan="2">INGRESOS</th>
                </tr>
                <tr>
                    <th>Categoría</th>
                    <th>Valor</th>
                </tr>
            </table>
            <table>
                <tr>
                    <th class="th-gastos" colspan="2">GASTOS</th>
                </tr>
                <tr>
                    <th>Categoría</th>
                    <th>Valor</th>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
