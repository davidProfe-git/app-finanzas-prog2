<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Financiero</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="fondo-decorativo"></div>

    <div class="contenedor">

        <header class="encabezado">
            <div class="logo-marca">
                <span class="icono-logo">◈</span>
                <span class="nombre-app">Finanzas</span>
            </div>

            <span class="fecha-hoy" id="fechaHoy"></span>
        </header>

        <!-- TOTAL -->
        <div class="total">
            <p class="total-etiqueta">Balance disponible</p>
            <p class="total-monto" id="balance">$0</p>

            <div class="total-barra">
                <div class="total-barra-fill"></div>
            </div>

            <div class="total-stats">

                <div class="stat">
                    <span class="stat-dot ingreso"></span>
                    <span class="stat-label">Ingresos</span>
                    <span class="stat-valor" id="totalIngresos">
$0
</span>
                </div>

                <div class="stat-divider"></div>

                <div class="stat">
                    <span class="stat-dot gasto"></span>
                    <span class="stat-label">Gastos</span>
                    <span class="stat-valor" id="totalGastos">
$0
</span>
                </div>

            </div>
        </div>

        <!-- BOTONES -->
        <div class="botones">

            <div class="opcion">
                <button class="btn-ingresos">
                    <span class="btn-icono">+</span>
                </button>

                <span class="btn-etiqueta">Ingresos</span>
            </div>

            <div class="opcion">
                <button class="btn-gastos">
                    <span class="btn-icono">−</span>
                </button>

                <span class="btn-etiqueta">Gastos</span>
            </div>

        </div>

        <!-- FORMULARIO -->
        <div class="formulario">

            <p class="form-titulo">Registrar gasto</p>

            <div class="campo">
                <label for="categoria">Categoría</label>

                <div class="select-wrapper">

                    <select id="categoria">
                        <option value="">Selecciona una opción</option>
                    </select>
                    <button type="button" id="btnCategoria" class="btn-categoria">
    + Nueva categoría
</button>


<div id="nuevaCategoriaBox" style="display:none;">

    <input 
        type="text" 
        id="nombreCategoria"
        placeholder="Ej: Estudio"
    >

    <button 
        type="button"
        id="guardarCategoria">
        Guardar categoría
    </button>

</div>
                    <span class="select-arrow">›</span>

                </div>
            </div>

            <div class="campo">

                <label for="monto">Monto</label>

                <div class="input-wrapper">

                    <span class="input-prefijo">$</span>

                    <input
                        type="number"
                        id="monto"
                        placeholder="20.000"
                    >

                </div>

            </div>

            <button class="guardar">
                Guardar gasto
            </button>

        </div>

        <!-- HISTORIAL -->
        <div class="historial">

            <div class="historial-encabezado">
                <p class="historial-titulo">Historial de gastos</p>
                <span class="historial-badge">Registros BD</span>
            </div>

            <!-- AQUÍ APP.JS INSERTARÁ LOS MOVIMIENTOS -->
            <ul class="historial-lista" id="registros-contenedor">
            </ul>

        </div>

    </div>

    <script>
        const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
        const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

        const hoy = new Date();

        document.getElementById('fechaHoy').textContent =
            `${dias[hoy.getDay()]}, ${hoy.getDate()} de ${meses[hoy.getMonth()]}`;
    </script>

    <script src="./js/app.js"></script>

</body>
</html>
