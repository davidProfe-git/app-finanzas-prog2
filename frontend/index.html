<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gestionador de Ingresos y Gastos</h1>
    <div>
        <input type="text">
    </div>
    <div>
        <label for="opciones">Elige una opción:</label>
        <select name="opciones" id="opciones">
            <option value="Categoria 1">Sueldo</option>
            <option value="Categoria 2">Ingreso extra</option>
            <option value="Categoria 3">Arriendo</option>
        </select>
    </div>
    <div>
        <button>Registrar</button>
    </div>
    <div>
        <div>
            <table>
                <tr border="1">
                    <th>INGRESOS</th>
                </tr>
                <tr border="1">
                    <th>Categoría</th>
                    <th>Valor</th>
                </tr>
            </table>
        </div>
        <div>
            <table>
                <tr border="1">
                    <th>GASTOS</th>
                </tr>
                <tr border="1">
                    <th>Categoría</th>
                    <th>Valor</th>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
