<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Gastos</title>
<link rel="stylesheet" href="css/style.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
<div id="contenedor">
<h1 id="titulo">Admin gastos</h1>
<div id="formulario">
<div class="campo">
<input type="number" id="monto" class="entrada" placeholder="$ Ingresos" min="0" step="0.01" />
</div>
<div class="campo">
<select id="categoria" class="entrada seleccion">
<!-- aca van mis categorias -->
</select>
</div>
<div class="campo">
<input type="date" id="fecha" class="entrada" />
</div>
<div id="grupo-botones">
<button id="boton-ingresos" class="boton boton-ingreso">Ingresos</button>
<button id="boton-gastos" class="boton boton-gasto">gastos</button>
</div>
</div>
<!-- seccion de listado de transacciones recientes -->
<div class="registos">
<div id="titulo"><h3>Registros recientes</h3></div>
<!-- aca va ir las transacciones que traigo de mi base de datos -->
<div id="registros-contenedor">
</div>
</div>
</div>
<script src="js/app.js"></script>
</body>
</html><!DOCTYPE html>
