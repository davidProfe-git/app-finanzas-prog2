<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tablero Financiero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        <h2>Mi Valor Neto</h2>
        
        <div class="total-value">
            <div class="amount-main">$12,450.00</div>
        </div>

        <div class="divider"></div>

        <div class="flow-container">
            <!-- Bloque de Ingresos -->
            <div class="card income-card">
                <span class="card-label">INGRESOS</span>
                <div class="income-amount">+ $3,200.00</div>
            </div>

            <!-- Bloque de Gastos -->
            <div class="card expense-card">
                <span class="card-label">GASTOS</span>
                <div class="expense-amount">- $1,150.00</div>
            </div>
        </div>
    </div>

</body>
</html>
