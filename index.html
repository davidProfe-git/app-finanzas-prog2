<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Finanzas</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

  <h1 class="text-center mb-5 text-primary">GESTION DE FINANZAS</h1>

  <div class="container">
    <div class="row g-4">
     
      <!-- Usuario -->
      <div class="col-md-3">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">Usuario</h5>
            <p class="card-text">Gestión de perfil y datos personales.</p>
            <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#usuarioModal">Ver más</button>
          </div>
        </div>
      </div>

      <!-- Ingresos -->
      <div class="col-md-3">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">Ingresos</h5>
            <p class="card-text">Registro y control de entradas de dinero.</p>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#ingresosModal">Ver más</button>
          </div>
        </div>
      </div>

      <!-- Gastos -->
      <div class="col-md-3">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">Gastos</h5>
            <p class="card-text">Seguimiento de compras y gastos.</p>
            <button class="btn btn-info" data-bs-toggle="modal" data-bs-target="#gastosModal">Ver más</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Usuario -->
  <div class="modal fade" id="usuarioModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Registro de Usuario</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form>
            <input type="text" class="form-control mb-3" placeholder="Nombre">
            <input type="email" class="form-control mb-3" placeholder="Correo" required>
            <input type="password" class="form-control mb-3" placeholder="Contraseña" required>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button class="btn btn-warning">Registrar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Ingresos -->
  <div class="modal fade" id="ingresosModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Agregar Ingresos</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form>
          <input type="number" class="form-control mb-3" placeholder="Monto" required>
          <input type="text" class="form-control mb-3" placeholder="Descripción">
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button class="btn btn-success">Guardar</button>
      </div>
    </div></div>
  </div>

  <!-- Egresos -->
  <div class="modal fade" id="egresosModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Agregar Egresos</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form>
          <input type="number" class="form-control mb-3" placeholder="Monto" required>
          <input type="text" class="form-control mb-3" placeholder="Descripción">
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button class="btn btn-danger">Guardar</button>
      </div>
    </div></div>
  </div>

  <!-- Gastos -->
  <div class="modal fade" id="gastosModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Agregar Gastos</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form>
          <input type="number" class="form-control mb-3" placeholder="Monto" required>
          <input type="text" class="form-control mb-3" placeholder="Descripción">
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button class="btn btn-info">Guardar</button>
      </div>
    </div></div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
